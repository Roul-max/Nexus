replicaCount: 2

image:
  repository: nexus-platform
  pullPolicy: IfNotPresent
  tag: "latest"

nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations: {}

podSecurityContext: {}

securityContext: {}

service:
  type: ClusterIP
  port: 80

ingress:
  enabled: true
  className: "nginx"
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
  hosts:
    - host: app.nexus.local
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls:
    - secretName: nexus-tls
      hosts:
        - app.nexus.local

resources:
  requests:
    cpu: 200m
    memory: 512Mi
  limits:
    cpu: 500m
    memory: 1Gi

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70

env:
  NODE_ENV: "production"
  ENABLE_TELEMETRY: "true"

secrets:
  DATABASE_URL: ""
  REDIS_URL: ""
  STRIPE_SECRET_KEY: ""
